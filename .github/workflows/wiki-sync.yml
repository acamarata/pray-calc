name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - '.github/wiki/**'

jobs:
  sync:
    name: Sync .github/wiki/ to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync wiki pages
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: .github/wiki/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
